<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Md. Mahmudur Rahman | AI Solutions Architect</title>
    <meta name="description" content="Professional portfolio of Md. Mahmudur Rahman, AI Solutions Architect specializing in LLMs and agentic workflows." />
    <meta property="og:title" content="Md. Mahmudur Rahman | AI Solutions Architect" />
    <meta property="og:description" content="Professional portfolio of Md. Mahmudur Rahman, AI Solutions Architect specializing in LLMs and agentic workflows." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Md. Mahmudur Rahman | AI Solutions Architect" />
    <meta name="twitter:description" content="Professional portfolio of Md. Mahmudur Rahman, AI Solutions Architect specializing in LLMs and agentic workflows." />
    <meta name="theme-color" content="#0A0A0A" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@400;600;800&family=Inter:wght@300;400;500&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
      body {
        background-color: #0A0A0A;
        color: #FFFFFF;
        overflow-x: hidden;
      }
      
      /* Noise Overlay */
      body::after {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 9999;
        opacity: 0.03;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      /* Custom Cursor Styles */
      .custom-cursor-dot {
        width: 8px;
        height: 8px;
        background-color: #2563EB;
        border-radius: 50%;
        position: fixed;
        pointer-events: none;
        z-index: 10000;
        transform: translate(-50%, -50%);
      }

      .custom-cursor-ring {
        width: 32px;
        height: 32px;
        border: 1px solid rgba(37, 99, 235, 0.3);
        border-radius: 50%;
        position: fixed;
        pointer-events: none;
        z-index: 9999;
        transform: translate(-50%, -50%);
        transition: width 0.3s ease, height 0.3s ease, background-color 0.3s ease;
      }
      
      @media (pointer: coarse) {
        .custom-cursor-dot, .custom-cursor-ring {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div class="custom-cursor-dot" id="cursor-dot"></div>
    <div class="custom-cursor-ring" id="cursor-ring"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
